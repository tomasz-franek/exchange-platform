<app-menu checkedInput="properties"></app-menu>
<app-property-menu checkedInput="userProperty"></app-property-menu>
<div>
  <form [formGroup]="formGroup">
    <div class="user-properties">
      <div>
        <label class="label" for="localeId">
          <span>{{ "LOCALE" | translate }}</span>
        </label>
        <p-select [options]="store.locales()"
                  class="w-full" formControlName="locale" id="localeId">
          <option value=""></option>
          <ng-template #item let-locale>
            {{ locale }}
          </ng-template>
        </p-select>
      </div>
      <div>
        <label class="label" for="timezoneId">
          <span>{{ "TIMEZONE" | translate }}</span>
        </label>
        <p-select [options]="store.timezones()" formControlName="timezone" id="timezoneId"
                  optionLabel="name" optionValue="id">
          <option value=""></option>
        </p-select>
      </div>
      <div>
        <label class="label" for="languageId">
          <span>{{ "LANGUAGE" | translate }}</span>
        </label>
        <p-select [options]="_languages$" formControlName="language"
                  id="languageId" optionLabel="name" optionValue="id">
          <option value=""></option>
          <ng-template #item let-language>
            <div>{{ language.name }}</div>
          </ng-template>
        </p-select>
      </div>
      <div>
        <p-button
          (onClick)="saveUserProperty()"
          [disabled]="formGroup.invalid"
          id="save"
        >
          {{ "SAVE" | translate }}
        </p-button>
      </div>
    </div>
  </form>
</div>
<p-toast></p-toast>
