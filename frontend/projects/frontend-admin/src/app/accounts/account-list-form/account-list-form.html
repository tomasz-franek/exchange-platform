<app-menu checkedInput="accounts"></app-menu>
<div>
  <app-account-menu checkedInput="accountList"></app-account-menu>
</div>
<div>
  <app-account-filter (accountRequestEvent)="onAccountFilterChanged($event)"/>
  @if (store.accountOperationsCount() > 0) {
    <p-paginator (onPageChange)="onPageChange($event)"
                 [first]="page"
                 [rowsPerPageOptions]="[10, 20, 50, 100]"
                 [rows]="rows" [totalRecords]="store.accountOperationsCount()"/>
  }
  <app-account-list [searchParams]="searchParams"/>
</div>
